y="Nunito, Segoe UI Emoji" font-size="28px" fill="#1e1e1e" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">- If any fields in the struct MUST</text><text x="0" y="271.712" font-family="Nunito, Segoe UI Emoji" font-size="28px" fill="#1e1e1e" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">not be copied (ex. sync primitives).</text></g><g transform="translate(10.000000275485633 649.9978325982701) rotate(0 220.58288249999998 52.50000000000003)"><text x="0" y="26.712" font-family="Nunito, Segoe UI Emoji" font-size="28px" fill="#1e1e1e" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">- If the struct is designed to be</text><text x="0" y="61.712" font-family="Nunito, Segoe UI Emoji" font-size="28px" fill="#1e1e1e" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">immutable, or have "value"</text><text x="0" y="96.712" font-family="Nunito, Segoe UI Emoji" font-size="28px" fill="#1e1e1e" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">semantics.</text></g><g transform="translate(27.9478985279207 10) rotate(0 189.23216247558594 39.46086810057431)"><text x="0" y="60.23306906871663" font-family="Nunito, Segoe UI Emoji" font-size="63.1373889609189px" fill="#1e1e1e" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">When to Use</text></g></svg>